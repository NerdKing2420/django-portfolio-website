{% extends 'portfolio/base.html' %} 
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
      
    {% block content %}
    <h1>Akshay's Portfolio!!</h1>
    <a href="{% url 'blog:all_blogs' %}">Blog</a> <br>
    <a href="{% static 'portfolio/Resume_CSV.pdf' %}">Resume</a><br>
    <img src="{% static 'portfolio/Profile.jpg' %}" alt="">
    {% for project in projects %}
    <h2>{{ project.title }}</h2>
    <p>{{ project.description }}</p>
    <img src="{{ project.image.url }}" width="250px" height="250px" alt="">
    {% if project.url %}
    <br><a href="{{ project.url }}">Link</a>
    {% endif %}
    {% endfor %}
    {% endblock %}
</body>
</html>
