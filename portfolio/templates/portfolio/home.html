{% extends 'portfolio/base.html' %} 
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
      
    {% block content %}
    <nav class="navbar">
        <div class="nav-title">
          <a class="title-link" href="{% url 'home' %}">Akshay</a>
        </div>
        <div class="navbar-links">
          <ul>
            <li><a href="{% url 'blog:all_blogs' %}">Blogs</a></li>
            <li ><a href="{% static 'portfolio/Resume_CSV.pdf' %}">Resume</a></li>
          </ul>
        </div>
    </nav>
    <div class="title">Hey there I am Akshay!</div>
    <img src="{% static 'portfolio/Profile.jpg' %}" alt="">
    {% for project in projects %}
    <h2>{{ project.title }}</h2>
    <p>{{ project.description }}</p>
    <img src="{{ project.image.url }}" width="250px" height="250px" alt="">
    {% if project.url %}
    <br><a href="{{ project.url }}">Link</a>
    {% endif %}
    {% endfor %}
    {% endblock %}
</body>
</html>
