<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
</head>
<body>
    <u><h1>My Blog</h1></u>
    {% for blogs in blog %}
    <h2>{{ blogs.title }}</h2>
    <p>{{ blogs.description }}</p>
    {% if blog.date %}
    <h4>{{ blog.date }}</h4>
    {% endif %}
    {% endfor %}
</body>
</html>
